<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LetsCollab Palette Generator</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="hero">
      <h1>LetsCollab Palette Generator</h1>
      <p>Edit shared colors, save to theme/palette.json, and sync Rider, Visual Studio, and VS Code themes.</p>
    </header>

    <main>
      <form id="palette-form" class="editor-pane">
        <section class="toolbar">
          <label class="version-field" for="theme-version">
            Version
            <input id="theme-version" type="text" spellcheck="false" />
          </label>
          <button type="button" id="reload">Reload</button>
          <button type="button" id="reset">Reset to Last Loaded</button>
          <button type="submit" class="primary">Save and Sync</button>
        </section>

        <section id="grid" class="grid" aria-live="polite"></section>
      </form>

      <section id="preview-pane" class="preview preview-pane">
        <div class="preview-header">
          <div>
            <h2>C# Syntax Preview</h2>
            <p id="preview-mapping" class="preview-mapping"></p>
          </div>
          <label class="preview-target-label" for="preview-target">
            Theme Target
            <select id="preview-target">
              <option value="rider">Rider</option>
              <option value="visualStudio">Visual Studio</option>
              <option value="vscode">VS Code</option>
            </select>
          </label>
        </div>
        <div class="code-frame">
          <pre id="preview-code" class="code-preview" aria-live="polite"></pre>
        </div>
      </section>

      <pre id="status" class="status">Loading palette...</pre>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
