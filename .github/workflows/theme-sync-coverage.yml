name: Theme Sync Coverage

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify generated themes are in sync
        run: node ./scripts/sync-theme-palette.mjs --check

      - name: Verify semantic mapping coverage
        run: node ./scripts/verify-theme-sync-coverage.mjs
