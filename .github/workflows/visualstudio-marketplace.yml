name: Publish Visual Studio Extension

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release VSIX assets
        uses: robinraju/release-downloader@v1.12
        with:
          repository: ${{ github.repository }}
          tag: ${{ github.event.release.tag_name }}
          fileName: "*.vsix"
          out-file-path: dist/release-assets
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Locate VSIX artifact
        id: vsix
        shell: pwsh
        run: |
          $artifact = Get-ChildItem -Path .\dist\release-assets\*.vsix |
            Where-Object { $_.Name -notmatch "vscode-theme" } |
            Select-Object -First 1

          if (-not $artifact) {
            throw "No Visual Studio VSIX found in downloaded release assets"
          }

          "path=$($artifact.FullName)" >> $env:GITHUB_OUTPUT

      - name: Publish to Visual Studio Marketplace
        uses: cezarypiatek/VsixPublisherAction@1.1
        with:
          extension-file: ${{ steps.vsix.outputs.path }}
          publish-manifest-file: VisualStudio/publishManifest.json
          personal-access-code: ${{ secrets.VS_MARKETPLACE_TOKEN }}
