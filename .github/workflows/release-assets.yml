name: Build Release Assets

on:
  push:
    tags:
      - "rider-v*"
      - "vs-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rider:
    name: Build Rider JAR
    if: startsWith(github.ref, 'refs/tags/rider-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Rider plugin JAR
        run: |
          chmod +x ./scripts/build-rider-plugin.sh
          ./scripts/build-rider-plugin.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Upload Rider JAR to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/rider/*.jar

  visual-studio:
    name: Build Visual Studio VSIX
    if: startsWith(github.ref, 'refs/tags/vs-v')
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Visual Studio VSIX
        shell: pwsh
        run: |
          $vswhere = "${Env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere not found at $vswhere"
          }
          $vsInstall = & $vswhere -latest -products * -property installationPath
          if (-not $vsInstall) {
            throw "Visual Studio installation not found via vswhere"
          }
          $vsToolsPath = Join-Path $vsInstall "MSBuild\Microsoft\VisualStudio\v18.0"
          if (-not (Test-Path (Join-Path $vsToolsPath "VSSDK"))) {
            $vsToolsPath = Join-Path $vsInstall "MSBuild\Microsoft\VisualStudio\v17.0"
          }
          if (-not (Test-Path (Join-Path $vsToolsPath "VSSDK"))) {
            throw "VSSDK targets not found under $vsToolsPath"
          }
          msbuild .\VisualStudio\LetsCollabTheme.sln -t:Restore -p:Configuration=Release -p:Platform="Any CPU" -p:VSToolsPath="$vsToolsPath"
          msbuild .\VisualStudio\LetsCollabTheme.sln -t:Rebuild -p:Configuration=Release -p:Platform="Any CPU" -p:VSToolsPath="$vsToolsPath"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Upload VSIX to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/visualstudio/*.vsix
