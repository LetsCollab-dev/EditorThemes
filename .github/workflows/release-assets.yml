name: Build Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-rider:
    name: Build Rider JAR
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Rider plugin JAR
        env:
          SKIP_THEME_SYNC: "1"
        run: |
          chmod +x ./scripts/build-rider-plugin.sh
          ./scripts/build-rider-plugin.sh

      - name: Upload Rider build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rider-jar
          path: dist/rider/*.jar
          if-no-files-found: error

  build-visual-studio:
    name: Build Visual Studio VSIX
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Visual Studio VSIX
        shell: pwsh
        run: |
          $vswhere = "${Env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere not found at $vswhere"
          }
          $vsInstall = & $vswhere -latest -products * -property installationPath
          if (-not $vsInstall) {
            throw "Visual Studio installation not found via vswhere"
          }
          $vsToolsPath = Join-Path $vsInstall "MSBuild\Microsoft\VisualStudio\v18.0"
          if (-not (Test-Path (Join-Path $vsToolsPath "VSSDK"))) {
            $vsToolsPath = Join-Path $vsInstall "MSBuild\Microsoft\VisualStudio\v17.0"
          }
          if (-not (Test-Path (Join-Path $vsToolsPath "VSSDK"))) {
            throw "VSSDK targets not found under $vsToolsPath"
          }
          msbuild .\VisualStudio\LetsCollabTheme.sln -t:Restore -p:Configuration=Release -p:Platform="Any CPU" -p:VSToolsPath="$vsToolsPath"
          msbuild .\VisualStudio\LetsCollabTheme.sln -t:Rebuild -p:Configuration=Release -p:Platform="Any CPU" -p:VSToolsPath="$vsToolsPath"

      - name: Upload Visual Studio build artifact
        uses: actions/upload-artifact@v4
        with:
          name: visualstudio-vsix
          path: VisualStudio/bin/Release/*.vsix
          if-no-files-found: error

  build-vscode:
    name: Build VS Code Theme VSIX
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: VSCode
        run: npm install

      - name: Remove existing VSIX artifacts
        working-directory: VSCode
        run: rm -f ./*.vsix

      - name: Package VS Code theme
        working-directory: VSCode
        run: npx @vscode/vsce package

      - name: Upload VS Code build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-vsix
          path: VSCode/*.vsix
          if-no-files-found: error

  publish-release:
    name: Create Release and Upload Assets
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-rider
      - build-visual-studio
      - build-vscode
    steps:
      - name: Download Rider artifact
        uses: actions/download-artifact@v4
        with:
          name: rider-jar
          path: dist/release-assets/rider

      - name: Download Visual Studio artifact
        uses: actions/download-artifact@v4
        with:
          name: visualstudio-vsix
          path: dist/release-assets/visualstudio

      - name: Download VS Code artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-vsix
          path: dist/release-assets/vscode

      - name: Remove stale managed assets from existing release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"

          if ! gh release view "${TAG_NAME}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "No existing release for ${TAG_NAME}; no cleanup required."
            exit 0
          fi

          ASSETS="$(gh release view "${TAG_NAME}" --repo "${{ github.repository }}" --json assets --jq '.assets[].name')"

          if [ -z "${ASSETS}" ]; then
            echo "Existing release has no assets; no cleanup required."
            exit 0
          fi

          while IFS= read -r asset; do
            [ -z "${asset}" ] && continue
            if echo "${asset}" | grep -Eiq '\.(jar|vsix)$'; then
              echo "Deleting stale asset ${asset}"
              gh release delete-asset "${TAG_NAME}" "${asset}" --repo "${{ github.repository }}" --yes
            fi
          done <<< "${ASSETS}"

      - name: Create draft release and upload all assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          generate_release_notes: true
          files: |
            dist/release-assets/rider/*.jar
            dist/release-assets/visualstudio/*.vsix
            dist/release-assets/vscode/*.vsix

      - name: Verify expected release assets exist
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          ASSET_NAMES="$(gh release view "${TAG_NAME}" --repo "${{ github.repository }}" --json assets --jq '.assets[].name')"

          if [ -z "${ASSET_NAMES}" ]; then
            echo "No assets found on release ${TAG_NAME}."
            exit 1
          fi

          echo "Release assets for ${TAG_NAME}:"
          echo "${ASSET_NAMES}"

          RIDER_COUNT="$(echo "${ASSET_NAMES}" | grep -Eic '\.jar$' || true)"
          VSCODE_COUNT="$(echo "${ASSET_NAMES}" | grep -Eic 'vscode-theme.*\.vsix$' || true)"
          VS_COUNT="$(echo "${ASSET_NAMES}" | grep -Ei '\.vsix$' | grep -Eiv 'vscode-theme' | wc -l | tr -d ' ')"

          if [ "${RIDER_COUNT}" -ne 1 ]; then
            echo "Expected exactly 1 Rider JAR asset on release ${TAG_NAME}; found ${RIDER_COUNT}."
            exit 1
          fi

          if [ "${VSCODE_COUNT}" -ne 1 ]; then
            echo "Expected exactly 1 VS Code VSIX asset on release ${TAG_NAME}; found ${VSCODE_COUNT}."
            exit 1
          fi

          if [ "${VS_COUNT}" -ne 1 ]; then
            echo "Expected exactly 1 Visual Studio VSIX asset on release ${TAG_NAME}; found ${VS_COUNT}."
            exit 1
          fi

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release edit "${GITHUB_REF_NAME}" --repo "${{ github.repository }}" --draft=false

  publish-vscode-marketplace:
    name: Publish VS Code Extension
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-vscode
      - publish-release
    steps:
      - name: Download VS Code artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-vsix
          path: dist/release-assets/vscode

      - name: Locate VS Code VSIX
        id: vscode-vsix
        shell: bash
        run: |
          set -euo pipefail
          VSIX_FILE="$(find dist/release-assets/vscode -maxdepth 1 -type f -name '*.vsix' | head -n 1 || true)"
          if [ -z "${VSIX_FILE}" ]; then
            echo "Unable to locate VS Code VSIX in build artifacts."
            exit 1
          fi
          echo "path=${VSIX_FILE}" >> "$GITHUB_OUTPUT"

      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ steps.vscode-vsix.outputs.path }}
          skipDuplicate: true

  publish-visualstudio-marketplace:
    name: Publish Visual Studio Extension
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2025-vs2026
    needs:
      - build-visual-studio
      - publish-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Visual Studio artifact
        uses: actions/download-artifact@v4
        with:
          name: visualstudio-vsix
          path: dist/release-assets/visualstudio

      - name: Locate VSIX artifact
        id: vsix
        shell: pwsh
        run: |
          $artifact = Get-ChildItem -Path .\dist\release-assets\visualstudio\*.vsix |
            Select-Object -First 1

          if (-not $artifact) {
            throw "No Visual Studio VSIX found in build artifacts"
          }

          "path=$($artifact.FullName)" >> $env:GITHUB_OUTPUT

      - name: Publish to Visual Studio Marketplace
        uses: cezarypiatek/VsixPublisherAction@1.1
        with:
          extension-file: ${{ steps.vsix.outputs.path }}
          publish-manifest-file: VisualStudio/publishManifest.json
          personal-access-code: ${{ secrets.VS_MARKETPLACE_TOKEN }}

  publish-jetbrains-marketplace:
    name: Publish JetBrains Plugin
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-rider
      - publish-release
    env:
      PLUGIN_ID: "26530"
      MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
    steps:
      - name: Download Rider artifact
        uses: actions/download-artifact@v4
        with:
          name: rider-jar
          path: dist/release-assets/rider

      - name: Locate Rider JAR artifact
        id: rider-jar
        shell: bash
        run: |
          set -euo pipefail
          JAR_FILE="$(find dist/release-assets/rider -maxdepth 1 -type f -name '*.jar' | head -n 1 || true)"
          if [ -z "${JAR_FILE}" ]; then
            echo "No Rider JAR found in build artifacts."
            exit 1
          fi
          echo "path=${JAR_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload to JetBrains Marketplace
        run: |
          set -euo pipefail
          if [ -z "${MARKETPLACE_TOKEN}" ]; then
            echo "JETBRAINS_MARKETPLACE_TOKEN is not set"
            exit 1
          fi
          curl -f -X POST \
            -H "Authorization: Bearer ${MARKETPLACE_TOKEN}" \
            -F "pluginId=${PLUGIN_ID}" \
            -F "file=@${{ steps.rider-jar.outputs.path }}" \
            https://plugins.jetbrains.com/plugin/uploadPlugin
