name: Publish JetBrains Plugin

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    env:
      PLUGIN_ID: "26530"
      MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
    steps:
      - name: Download release JAR assets
        uses: robinraju/release-downloader@v1.12
        with:
          repository: ${{ github.repository }}
          tag: ${{ github.event.release.tag_name }}
          fileName: "*.jar"
          out-file-path: dist/release-assets
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Locate Rider JAR artifact
        id: rider-jar
        shell: bash
        run: |
          set -euo pipefail
          JAR_FILE="$(find dist/release-assets -maxdepth 1 -type f -name '*.jar' | head -n 1 || true)"
          if [ -z "${JAR_FILE}" ]; then
            echo "No Rider JAR found in downloaded release assets."
            exit 1
          fi
          echo "path=${JAR_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload to JetBrains Marketplace
        run: |
          set -euo pipefail
          if [ -z "${MARKETPLACE_TOKEN}" ]; then
            echo "JETBRAINS_MARKETPLACE_TOKEN is not set"
            exit 1
          fi
          curl -f -X POST \
            -H "Authorization: Bearer ${MARKETPLACE_TOKEN}" \
            -F "pluginId=${PLUGIN_ID}" \
            -F "file=@${{ steps.rider-jar.outputs.path }}" \
            https://plugins.jetbrains.com/plugin/uploadPlugin
